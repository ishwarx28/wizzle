# Generated from Models.dev plus Wizzle transport/reasoning metadata.
schemaVersion: 1
revision: "models.dev-2026-07-17"
source:
  url: "https://models.dev/api.json"
  providerId: "meta"
provider:
  id: "meta"
  name: "Meta"
  transport: "openai_chat_completions"
  endpoint: "https://api.meta.ai/v1"
  routes:
    chatCompletions: "/chat/completions"
    models: "/models"
  auth:
    mode: "api_key"
    required: true
    location: "header"
    name: "Authorization"
    prefix: "Bearer "
  setupFields: []
  defaults:
    modelId: "muse-spark-1.1"
    maxContext: 128000
    maxOutputTokens: 8192
  modelCatalog:
    mode: "fixed"
    unknownModelPolicy: "exclude"
  headers: []
reasoningRecipes:
  replay-openai:
    variants: []
    replay:
      scope: "active_tool_loop"
      preserveExactly: true
      capture:
        - responsePath: "/choices/*/delta/reasoning_content"
          assistantMessagePath: "/reasoning_content"
          operation: "append"
        - responsePath: "/choices/*/delta/reasoning"
          assistantMessagePath: "/reasoning"
          operation: "append"
models:
  - modelId: "muse-spark-1.1"
    displayName: "Muse Spark 1.1"
    capabilities: ["text", "image", "video"]
    maxContext: 1000000
    maxOutputTokens: 32000
    reasoningRef: "replay-openai"
