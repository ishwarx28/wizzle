name: Build Desktop Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-desktop-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify desktop app
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: wizzle-agent/.nvmrc
          cache: npm
          cache-dependency-path: wizzle-agent/package-lock.json

      - name: Install Rust verification tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: wizzle-agent/src-tauri -> target

      - name: Install desktop app dependencies
        working-directory: wizzle-agent
        run: npm ci

      - name: Run frontend tests
        working-directory: wizzle-agent
        run: npm test

      - name: Build frontend
        working-directory: wizzle-agent
        run: npm run build

      - name: Check Rust formatting
        working-directory: wizzle-agent/src-tauri
        run: cargo fmt --all -- --check

      - name: Run Rust Clippy
        working-directory: wizzle-agent/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        working-directory: wizzle-agent/src-tauri
        run: cargo test --all-features -- --skip agent::tools::shell::tests::process_group_termination_stops_shell_descendants

  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: verify
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS DMG
            os: macos-latest
            bundle: dmg
            artifact_name: wizzle-macos-dmg
            artifact_path: wizzle-agent/src-tauri/target/release/bundle/dmg/*.dmg
          - label: Windows EXE
            os: windows-latest
            bundle: nsis
            artifact_name: wizzle-windows-exe
            artifact_path: wizzle-agent/src-tauri/target/release/bundle/nsis/*.exe
          - label: Linux AppImage
            os: ubuntu-22.04
            bundle: appimage
            artifact_name: wizzle-linux-appimage
            artifact_path: wizzle-agent/src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: wizzle-agent/.nvmrc
          cache: npm
          cache-dependency-path: wizzle-agent/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: wizzle-agent/src-tauri -> target

      - name: Install desktop app dependencies
        working-directory: wizzle-agent
        run: npm ci

      - name: Build package
        working-directory: wizzle-agent
        env:
          WIZZLE_CONFIG_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/remote-config/app-config.yaml
        run: npm run tauri build -- --bundles ${{ matrix.bundle }} --ci

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare stable release asset names
        shell: bash
        run: |
          mkdir release-assets

          copy_asset() {
            local pattern="$1"
            local destination="$2"
            mapfile -t matches < <(find release-artifacts -type f -name "$pattern")
            if [[ ${#matches[@]} -ne 1 ]]; then
              echo "Expected one $pattern artifact, found ${#matches[@]}." >&2
              exit 1
            fi
            cp "${matches[0]}" "release-assets/$destination"
          }

          copy_asset "*.dmg" "Wizzle-macOS.dmg"
          copy_asset "*.exe" "Wizzle-Windows.exe"
          copy_asset "*.AppImage" "Wizzle-Linux.AppImage"

      - name: Replace previous rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view main-build >/dev/null 2>&1; then
            gh release delete main-build --cleanup-tag --yes
          fi

      - name: Publish rolling main release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-build
          name: Main Build
          body: |
            Automated desktop builds for the latest push to `main`.

            The fixed asset names keep download URLs stable across builds. These packages are
            currently unsigned, so the operating system may show a security warning.
          prerelease: true
          draft: false
          make_latest: false
          generate_release_notes: false
          append_body: false
          overwrite_files: true
          files: |
            release-assets/*
